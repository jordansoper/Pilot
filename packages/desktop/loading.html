<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        background: #0f1115;
        color: #9ca3af;
        font: 15px/1.5 -apple-system, system-ui, sans-serif;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #0ea5e9;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="dot"></div>
    <div>Starting Pilot…</div>
  </body>
</html>
